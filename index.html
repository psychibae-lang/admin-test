<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정신건강 검사 관리자</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f5;color:#1a1a1a;min-height:100vh}
.top-bar{background:#fff;border-bottom:1px solid #ebebeb;padding:0 1.5rem;display:flex;align-items:center;position:sticky;top:0;z-index:20}
.top-bar h1{font-size:15px;font-weight:600;padding:1rem 0;margin-right:1.5rem;flex-shrink:0}
.tabs{display:flex;flex:1}
.tab{padding:1rem 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#888;white-space:nowrap}
.tab.act{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.top-right{margin-left:auto}
.content{padding:1.25rem 1.5rem}
.screen{display:none}.screen.active{display:block}
.btn{padding:7px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;font-weight:500;color:#1a1a1a;white-space:nowrap;transition:all 0.12s}
.btn:hover{background:#f5f5f3}.btn.pri{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.blue{background:#2563eb;color:#fff;border-color:#2563eb}.btn.sm{padding:4px 10px;font-size:11px}

/* 카테고리 카드 */
.cat-lbl{font-size:12px;font-weight:600;color:#888;margin-bottom:8px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.cat-card{background:#fff;border:1.5px solid #e8e8e8;border-radius:10px;padding:12px 14px;cursor:pointer;transition:all 0.12s}
.cat-card:hover{border-color:#bbb;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.cat-card.act{border-color:#2563eb;background:#eff6ff}
.cat-card-name{font-size:14px;font-weight:700;margin-bottom:8px}
.cat-card-items{display:flex;flex-direction:column;gap:3px}
.cat-card-items span{font-size:12px;color:#555;display:flex;align-items:center;gap:4px}
.cat-card-items em{font-style:normal;font-size:10px;color:#aaa;min-width:22px}

/* 개별 검사 */
.scale-filter{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.sf-btn{padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;transition:all 0.12s}
.sf-btn.act{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.scale-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:6px;margin-bottom:12px}
.sc-card{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:8px 10px;cursor:pointer;transition:all 0.12s}
.sc-card:hover{border-color:#bbb}.sc-card.sel{border:1.5px solid #2563eb;background:#eff6ff}
.sc-no{font-size:10px;color:#bbb;margin-bottom:2px}
.sc-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;margin-bottom:3px}
.tag-dep{background:#dbeafe;color:#1d4ed8}.tag-anx{background:#d1fae5;color:#065f46}
.tag-ocd{background:#ede9fe;color:#5b21b6}.tag-ptsd{background:#fef3c7;color:#92400e}.tag-other{background:#f3f4f6;color:#374151}
.sc-name{font-size:12px;font-weight:700}.sc-title{font-size:10px;color:#aaa}

/* 선택 바 */
.sel-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;margin-bottom:12px;flex-wrap:wrap}
.sel-info{font-size:12px;color:#0284c7;font-weight:500;white-space:nowrap}
.chips{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.chip{background:#fff;border:1px solid #bae6fd;border-radius:20px;padding:2px 8px;font-size:11px;color:#0369a1;display:flex;align-items:center;gap:4px}
.chip .rm{cursor:pointer;color:#94a3b8;font-size:12px}.chip .rm:hover{color:#ef4444}

/* 발급 */
.issue-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.issue-inp{padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.issue-inp:focus{border-color:#2563eb}
.issue-btns{display:grid;grid-template-columns:1fr 1fr 1fr;border-radius:10px;overflow:hidden;border:1.5px solid #1a1a1a;margin-bottom:12px}
.iss-btn{padding:14px 8px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;border:none;transition:opacity 0.12s}
.iss-btn:hover{opacity:0.85}
.iss-btn.lnk{background:#1a1a1a;color:#fff}.iss-btn.dir{background:#ef4444;color:#fff}.iss-btn.qr{background:#374151;color:#fff}
.link-box{background:#f5f5f3;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:8px}
.link-url{font-size:11px;color:#555;font-family:monospace;word-break:break-all;flex:1}

/* 테이블 */
.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.filter-bar input,.filter-bar select{padding:7px 12px;border:1px solid #ddd;border-radius:7px;font-size:12px;outline:none}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:1050px}
th{text-align:left;padding:9px 10px;font-weight:500;font-size:11px;color:#888;border-bottom:1px solid #ebebeb;white-space:nowrap;background:#fafaf9;cursor:pointer;user-select:none}
th:hover{color:#1a1a1a}
td{padding:8px 10px;border-bottom:1px solid #f5f5f3;vertical-align:middle}
tr:hover td{background:#fafaf9}
.sev{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
.sev-n{background:#d1fae5;color:#065f46}.sev-m{background:#fef3c7;color:#92400e}
.sev-mo{background:#ffedd5;color:#9a3412}.sev-s{background:#fee2e2;color:#991b1b}
.sort-asc::after{content:' ↑'}.sort-desc::after{content:' ↓'}

/* 모달/기타 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:420px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:10px}
.modal-close{float:right;cursor:pointer;font-size:18px;color:#888}
.status-badge{font-size:11px;padding:2px 8px;border-radius:10px}
.s-done{background:#d1fae5;color:#065f46}.s-wait{background:#fef3c7;color:#92400e}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.2s;pointer-events:none}
.toast.show{opacity:1}
.empty{text-align:center;padding:3rem;color:#aaa;font-size:13px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #e8e8e8;border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:2rem;color:#aaa;font-size:13px}
.search-row{display:flex;gap:8px;margin-bottom:1rem}
.search-inp{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.res-card-pt{background:#fff;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px;border:1px solid #e8e8e8}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

.cat-cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.cat-card{background:#fff;border:1.5px solid #e8e8e8;border-radius:10px;padding:12px 14px;cursor:pointer;transition:all 0.12s;min-height:90px}
.cat-card:hover{border-color:#bbb;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.cat-card.act{border-color:#2563eb;background:#eff6ff}
.cat-card-name{font-size:14px;font-weight:700;margin-bottom:8px}
.cat-card-items{display:flex;flex-direction:column;gap:3px}
.cat-card-items span{font-size:12px;color:#555;display:flex;align-items:center;gap:4px}
.cat-card-items em{font-style:normal;font-size:10px;color:#aaa;min-width:24px}
</style>
</head>
<body>

<div id="main-app">
  <div class="top-bar">
    <h1>🧠 검사 관리</h1>
    <div class="tabs">
      <div class="tab act" onclick="switchTab('issue')">검사 발급</div>
      <div class="tab" onclick="switchTab('results')">결과 현황</div>
      <div class="tab" onclick="switchTab('patient')">환자별 조회</div>
    </div>
  </div>

  <div class="screen active content" id="tab-issue">
    <div class="cat-lbl">카테고리 선택 (클릭시 자동 선택)</div>
    <div class="cat-cards-grid" id="cat-cards"></div>

    <div class="scale-filter">
      <button class="sf-btn act" data-cat="all" onclick="filterScales('all',this)">전체</button>
      <button class="sf-btn" data-cat="dep" onclick="filterScales('dep',this)">우울</button>
      <button class="sf-btn" data-cat="anx" onclick="filterScales('anx',this)">불안</button>
      <button class="sf-btn" data-cat="ocd" onclick="filterScales('ocd',this)">강박</button>
      <button class="sf-btn" data-cat="ptsd" onclick="filterScales('ptsd',this)">외상</button>
      <button class="sf-btn" data-cat="other" onclick="filterScales('other',this)">기타</button>
    </div>
    <div class="scale-grid" id="scale-grid"></div>

    <div class="sel-bar">
      <span class="sel-info" id="sel-count">0개 선택됨</span>
      <div class="chips" id="chips"><span style="font-size:11px;color:#94a3b8">검사지를 선택해 주세요</span></div>
      <button class="btn sm" onclick="clearAll()">모두 해제</button>
    </div>

    <div class="issue-row">
      <input class="issue-inp" id="pt-name-inp" placeholder="환자 이름 / 번호 *필수" style="flex:1;min-width:160px" />
      <input class="issue-inp" id="pt-title-inp" placeholder="타이틀 (예: AD)" style="width:120px" />
    </div>
    <div class="issue-btns">
      <div class="iss-btn lnk" onclick="issueLink('link')">🔗 링크 발급</div>
      <div class="iss-btn dir" onclick="issueLink('direct')">▶ 바로 검사</div>
      <div class="iss-btn qr" onclick="issueLink('qr')">📷 QR 발급</div>
    </div>
    <div id="link-result" style="display:none">
      <div class="link-box">
        <span class="link-url" id="link-url-txt"></span>
        <button class="btn sm" onclick="copyText(document.getElementById('link-url-txt').textContent)">복사</button>
      </div>
      <div id="qr-section" style="display:none;margin-top:10px;text-align:center">
        <div id="qr-container"></div>
        <p style="font-size:11px;color:#aaa;margin-top:6px">QR 코드를 스캔하면 검사가 시작됩니다</p>
      </div>
    </div>
  </div>

  <div class="screen content" id="tab-results">
    <div class="filter-bar">
      <input id="f-name" placeholder="이름/번호 검색" oninput="renderTable()" />
      <input id="f-scale" placeholder="검사명 검색" oninput="renderTable()" />
      <select id="f-status" onchange="renderTable()">
        <option value="">전체</option><option value="완료">완료</option><option value="대기중">대기중</option>
      </select>
      <button class="btn sm" onclick="loadResults()">새로고침</button>
    </div>
    <div class="tbl-wrap" id="tbl-wrap"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <div class="screen content" id="tab-patient">
    <div class="search-row">
      <input class="search-inp" id="pt-search" placeholder="환자 이름 또는 번호 입력" onkeydown="if(event.key==='Enter')searchPatient()" />
      <button class="btn pri" onclick="searchPatient()">검색</button>
    </div>
    <div id="pt-result"></div>
  </div>
</div>

<div class="modal-bg" id="modal-comment" style="display:none" onclick="closeModal('modal-comment')">
  <div class="modal" onclick="event.stopPropagation()">
    <span class="modal-close" onclick="closeModal('modal-comment')">✕</span>
    <h2>COMMENT 편집</h2>
    <textarea id="comment-inp" rows="5" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;resize:vertical;margin-top:10px"></textarea>
    <div style="display:flex;gap:6px;margin-top:10px;justify-content:flex-end">
      <button class="btn" onclick="closeModal('modal-comment')">취소</button>
      <button class="btn pri" onclick="saveComment()">저장</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-qr" style="display:none" onclick="closeModal('modal-qr')">
  <div class="modal" style="text-align:center" onclick="event.stopPropagation()">
    <span class="modal-close" onclick="closeModal('modal-qr')">✕</span>
    <h2 style="margin-bottom:1rem">QR 코드</h2>
    <div id="modal-qr-inner"></div>
    <p style="font-size:11px;color:#888;margin-top:10px" id="modal-qr-url"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCALES = {
  asrs:{no:1,title:'AD',name:'ASRS',cat:'other',tag:'ADHD',
    inst:'지난 6개월 동안 당신이 어떻게 느끼고 행동하였는지를 가장 잘 나타내주는 칸에 표시하세요.',
    comment:'총 18문항. 주요문항 6문항중 4문항 이상에서 절단값 만족시 ADHD의심, 최고점은 72점.',
    qs:['1. 어떤 일의 어려운 부분은 끝내 놓고도, 그 일을 마무리 짓지 못해 곤란을 겪은 적이 있습니까?','2. 체계가 필요한 일을 해야 할 때 순서대로 진행하기 어려운 경우가 있습니까?','3. 약속이나 해야 할 일을 잊어버려 곤란을 겪은 적이 있습니까?','4. 골치아픈 일은 피하거나 미루는 경우가 있습니까?','5. 오래 앉아있을 때, 손을 만지작거리거나 발을 꼼지락거리는 경우가 있습니까?','6. 마치 모터가 달린 것처럼, 과도하게 혹은 멈출 수 없이 활동을 하는 경우가 있습니까?','7. 지루하고 어려운 일을 할 때, 부주의해서 실수를 하는 경우가 있습니까?','8. 지루하고 반복적인 일을 할 때, 주의집중이 힘든 경우가 있습니까?','9. 대화중, 특히 상대방이 당신에게 직접적으로 말하고 있을 때에도, 집중하기 힘든 경우가 있습니까?','10. 집이나 직장에서 물건을 엉뚱한 곳에 두거나 어디에 두었는지 찾기 어려운 경우가 있습니까?','11. 주변에서 벌어지는 일이나 소음 때문에 주의가 산만해지는 경우가 있습니까?','12. 회의나 다른 사회적 상황에서 계속 앉아있어야 함에도 잠깐씩 자리를 뜨는 경우가 있습니까?','13. 안절부절 못하거나 조바심하는 경우가 있습니까?','14. 혼자 쉬고 있을 때, 긴장을 풀거나 마음을 편하게 갖기 어려운 경우가 있습니까?','15. 사회적 상황에서 나 혼자 말을 너무 많이 한다고 느끼는 경우가 있습니까?','16. 대화 도중 상대방이 말을 끝내기 전에 끼어들어 상대방의 말을 끊는 경우가 있습니까?','17. 차례를 지켜야 하는 상황에서 자신의 차례를 기다리는 것이 어려운 경우가 있습니까?','18. 다른 사람이 바쁘게 일할 때, 방해되는 행동을 하는 경우가 있습니까?'],
    opts:[['0','전혀 그렇지 않다'],['1','거의 그렇지 않다'],['2','약간 혹은 가끔 그렇다'],['3','자주 그렇다'],['4','매우 자주 그렇다']],
    score(a){const s1=[0,1,2].reduce((t,i)=>t+(a[i]>=2?1:0),0)+[3,4,5].reduce((t,i)=>t+(a[i]>=3?1:0),0);const s2=a.reduce((t,v)=>t+v,0);const interp=s1>=4?'ADHD의심':'ADHD아님';return{s1,s2,display:`${s1}/ ${s2}`,interp,copy:(d)=>`${d}/ ASRS/ ${s1}/ ${s2}/ ${a.slice(0,6).join('- ')}/ ${interp}`};}},
  cape15:{no:2,title:'PSY1',name:'CAPE15',cat:'other',tag:'정신증',isDouble:true,
    inst:'각 항목에 대해 얼마나 자주 해당 사항을 경험하는지 답해주시고, 해당 경험이 있을 경우 얼마나 힘드셨는지 체크해주십시오.',
    comment:'30문항 (빈도 15문항, 고통 15문항), 컷 점수는 6.',

  cesd:{no:4,title:'D1',name:'CESD',cat:'dep',tag:'우울',

  ocir:{no:17,title:'강박1',name:'OCIR',cat:'ocd',tag:'강박',
    inst:'이 질문지는 많은 사람들이 일상생활에서 경험할 수 있는 내용들로 구성되어 있습니다. 각 문항을 읽고, 지난 1달 동안 다음의 경험들로 인해 당신이 얼마나 스트레스를 받았거나 힘들었는지 선택하시기 바랍니다.',
    comment:'18문항, 최고점 72점, 절단값21점. 저장/확인및의심/정렬/정신적중화/세척/강박생각 절단값4점.',

  docs:{no:19,title:'강박3',name:'DOCS',cat:'ocd',tag:'강박',hasQOpts:true,

  };
  return base+encodeURIComponent(JSON.stringify(ch));
}

let selScales=new Set();

function renderCatCards(){
  const el=document.getElementById('cat-cards');
  if(!el)return;
  el.innerHTML=CATEGORIES.map(c=>`
    <div class="cat-card" id="cat-${c.id}" onclick="selectCat('${c.id}')">
      <div class="cat-card-name" style="color:${c.color}">${c.name}</div>
      <div class="cat-card-items">${c.display.map(d=>`<span><em>${d[0]}</em> ${d[1]}</span>`).join('')}</div>
    </div>`).join('');
}

function selectCat(catId){
  const cat=CATEGORIES.find(c=>c.id===catId);if(!cat)return;
  const allSel=cat.scales.every(id=>selScales.has(id));
  if(allSel){cat.scales.forEach(id=>selScales.delete(id));document.getElementById('cat-'+catId).classList.remove('act');}
  else{cat.scales.forEach(id=>selScales.add(id));document.getElementById('cat-'+catId).classList.add('act');}
  renderScaleGrid(document.querySelector('.sf-btn.act')?.dataset.cat||'all');
  renderChips();
}

function renderScaleGrid(cat){
  const list=cat==='all'?SCALE_ORDER:SCALE_ORDER.filter(id=>{
    const s=SCALES[id];if(!s)return false;
    if(cat==='other')return s.cat==='other';
    return s.cat===cat;
  });
  const el=document.getElementById('scale-grid');
  if(!el)return;
  el.innerHTML=list.map(id=>{
    const s=SCALES[id];if(!s)return'';
    return`<div class="sc-card ${selScales.has(id)?'sel':''}" onclick="toggleSc('${id}')">
      <div class="sc-no">${s.no}/</div>
      <span class="sc-tag ${TAG_CLS[s.cat]||'tag-other'}">${s.tag}</span>
      <div class="sc-name">${s.name}</div>
      <div class="sc-title">[${s.title}] ${s.qs.length}문항</div>
    </div>`;
  }).join('');
}

function filterScales(cat,el){
  document.querySelectorAll('.sf-btn').forEach(b=>b.classList.remove('act'));
  el.classList.add('act');
  renderScaleGrid(cat);
}

function toggleSc(id){
  selScales.has(id)?selScales.delete(id):selScales.add(id);
  CATEGORIES.forEach(c=>{
    const el=document.getElementById('cat-'+c.id);
    if(el)el.classList.toggle('act',c.scales.every(sid=>selScales.has(sid)));
  });
  renderScaleGrid(document.querySelector('.sf-btn.act')?.dataset.cat||'all');
  renderChips();
}

function renderChips(){
  const chips=document.getElementById('chips');
  document.getElementById('sel-count').textContent=selScales.size+'개 선택됨';
  if(selScales.size===0){chips.innerHTML='<span style="font-size:11px;color:#94a3b8">검사지를 선택해 주세요</span>';return;}
  chips.innerHTML=[...selScales].map(id=>{
    const s=SCALES[id];
    return`<div class="chip"><span>[${s?.title||''}] ${s?.name||id}</span><span class="rm" onclick="removeSc('${id}')">×</span></div>`;
  }).join('');
}

function removeSc(id){
  selScales.delete(id);
  CATEGORIES.forEach(c=>{const el=document.getElementById('cat-'+c.id);if(el)el.classList.remove('act');});
  renderScaleGrid(document.querySelector('.sf-btn.act')?.dataset.cat||'all');renderChips();
}

function clearAll(){
  selScales.clear();

}

let allSessions=[],allResults=[],sortCol='time',sortDir='desc';
async function loadResults(){
  const wrap=document.getElementById('tbl-wrap');
  if(wrap)wrap.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const{data:sess}=await sb.from('sessions').select('*').order('created_at',{ascending:false});
  const{data:res}=await sb.from('results').select('*');
  allSessions=sess||[];allResults=res||[];renderTable();
}

function renderTable(){
  const fName=(document.getElementById('f-name')?.value||'').toLowerCase();
  const fScale=(document.getElementById('f-scale')?.value||'').toLowerCase();
  const fStatus=document.getElementById('f-status')?.value||'';
  const now=Date.now();
  let rows=[];
  allSessions.forEach(sess=>{
    if(sess.status!=='완료'){const age=(now-new Date(sess.created_at).getTime())/86400000;if(age>7)return;}
    const sr=allResults.filter(r=>r.session_id===sess.id);
    if(sr.length===0)rows.push({sess,res:null});
    else sr.forEach(r=>rows.push({sess,res:r}));
  });
  rows=rows.filter(({sess,res})=>{
    if(fName&&!(sess.patient_name||'').toLowerCase().includes(fName))return false;
    if(fScale&&res&&!(res.scale_id||'').toLowerCase().includes(fScale))return false;
    if(fStatus&&sess.status!==fStatus)return false;
    return true;
  });
  rows.sort((a,b)=>{
    let va,vb;
    if(sortCol==='time'){va=a.sess.created_at;vb=b.sess.created_at;}
    else if(sortCol==='name'){va=a.sess.patient_name||'';vb=b.sess.patient_name||'';}
    else if(sortCol==='title'){va=a.res?SCALES[a.res.scale_id]?.title||'':a.sess.title||'';vb=b.res?SCALES[b.res.scale_id]?.title||'':b.sess.title||'';}
    else{va=a.res?.scale_id||'';vb=b.res?.scale_id||'';}
    return sortDir==='asc'?(va>vb?1:-1):(va<vb?1:-1);
  });
  const wrap=document.getElementById('tbl-wrap');
  if(rows.length===0){wrap.innerHTML='<div class="empty">검색 결과가 없습니다.</div>';return;}
  const ch=(col,lbl)=>`<th class="${sortCol===col?'sort-'+sortDir:''}" onclick="doSort('${col}')">${lbl}</th>`;
  wrap.innerHTML=`<table><thead><tr>
    ${ch('time','TIME')}${ch('name','이름')}${ch('title','타이틀')}${ch('scale','검사명')}
    <th>검사결과</th><th>검사해석</th><th>검사복사</th><th>COMMENT</th><th>저장</th><th>그래프</th><th>링크(QR)</th>
  </tr></thead><tbody>${rows.map(({sess,res})=>renderRow(sess,res)).join('')}</tbody></table>`;
}

async function savePDF(sessId,scaleId){

  const sc=SCALES[scaleId];
  const extra=tryParse(res.extra_scores||'{}');
  const dt=new Date(res.completed_at||sess.created_at);
  const dateStr=`${String(dt.getFullYear()).slice(2)}${p2(dt.getMonth()+1)}${p2(dt.getDate())}`;

  if(sc&&sc.qs){
    sc.qs.forEach((q,i)=>{
      const val=answers[i];
      let optLabel='';
      if(sc.isDouble){
        const opts=i%2===0?sc.optsFreq:sc.optsDist;
        const found=opts?opts.find(o=>parseInt(o[0])===val):null;
        optLabel=found?`${found[0]} ${found[1]}`:`${val}`;
      } else if(sc.hasQOpts&&sc.qOpts&&sc.qOpts[i]){

        optLabel=found?`${found[0]} ${found[1]}`:`${val}`;
      } else if(sc.opts){
        const found=sc.opts.find(o=>parseInt(o[0])===val);
        optLabel=found?`${found[0]} ${found[1]}`:`${val}`;
      }
      qaHtml+=`<div class="qa"><div class="q">${q}</div><div class="a">→ ${optLabel!==undefined&&optLabel!==''?optLabel:'-'}</div></div>`;

  }
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>${sess.patient_name||''}${sc?.name||''}${dateStr}</title>

  </head><body>
  <h1>정신건강 검사 결과지</h1>
  <div class="meta"><b>시행날짜</b>: ${dateStr} &nbsp;|&nbsp; <b>환자</b>: ${sess.patient_name||''}<br>
  <b>검사명</b>: ${sc?.name||scaleId} (${sc?.qs?.length||0}문항)</div>
  <h2>검사 결과</h2>
  <div class="result-box"><div class="score">${extra.display||res.score}</div><div><span class="sev">${res.interp||''}</span></div></div>
  ${gUrl?`<h2>결과 그래프 1 (총점)</h2><img src="${gUrl}" style="max-width:300px;border-radius:10px;display:block;margin-bottom:1rem" />`:''}
  ${(scaleId==='ocir'||scaleId==='moci')?`<h2>결과 그래프 2 (세부지표)</h2><img src="${getGraphUrl2(scaleId,extra)||''}" style="max-width:400px;border-radius:10px;display:block;margin-bottom:1rem" />`:''}
  <h2>COMMENT (검사해석)</h2>
  <div class="comment">${res.comment||sc?.comment||'-'}</div>
  ${res.copy_text?`<h2>검사복사 (차트기록용)</h2><div class="copy">${res.copy_text}</div>`:''}
  <h2>검사 응답지 (${sc?.qs?.length||0}문항)</h2>${qaHtml}
  <br>
  <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-top:1rem" class="no-print">
    <button onclick="window.print()" style="padding:11px 24px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:14px">🖨️ 인쇄 / PDF 저장</button>
    <div style="font-size:12px;color:#555;padding:8px 12px;background:#f0f9ff;border-radius:8px;word-break:break-all"><b>결과 확인 링크:</b><br>${fromRowUrl||''}</div>
  </div>
  </body></html>`);w.document.close();
  // QR 주입 (별도 스크립트로)
  var _s=w.document.createElement('script');
  _s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  _s.onload=function(){
    var _d=w.document.createElement('div');
    _d.style.cssText='text-align:center;margin-top:8px;';
    _d.innerHTML='<div id="_rqr"></div><p style="font-size:10px;color:#aaa">검사 링크 QR</p>';
    w.document.body.appendChild(_d);
    if(fromRowUrl)new QRCode(w.document.getElementById('_rqr'),{text:fromRowUrl,width:120,height:120});
  };
  w.document.head.appendChild(_s);
}


function getGraphUrl2(scaleId, extra){
  // OCIR/MOCI 세부지표 그래프
  const base='https://quickchart.io/chart?w=400&h=300&plugins=chartjs-plugin-annotation,chartjs-plugin-datalabels&bkg=rgba(240,230,255,1)&c=';
  
  if(scaleId==='ocir'){
    const display=extra?.display||'';
    const parts=display.split('/');
    const sub=parts[1]||'';
    const vals=sub.trim().split('-').map(v=>parseInt(v.trim())||0);
    const [저장,확인의심,정렬,정신적중화,세척,강박생각]=[vals[0]||0,vals[1]||0,vals[2]||0,vals[3]||0,vals[4]||0,vals[5]||0];
    const ch={type:'bar',
      data:{labels:['저장','확인/의심','정렬','정신적중화','세척','강박생각'],
        datasets:[{label:'점수',data:[저장,확인의심,정렬,정신적중화,세척,강박생각],
          backgroundColor:['rgba(139,92,246,0.7)','rgba(99,102,241,0.7)','rgba(59,130,246,0.7)','rgba(16,185,129,0.7)','rgba(245,158,11,0.7)','rgba(239,68,68,0.7)'],
          borderWidth:1}]},
      options:{legend:{display:false},
        title:{display:true,text:'OCIR 세부지표 (절단값: 각 4점)',fontSize:14,fontStyle:'bold'},
        scales:{yAxes:[{ticks:{beginAtZero:true,max:12}}]},
        plugins:{datalabels:{anchor:'end',align:'top',font:{size:14,weight:'bold'}}},
        annotation:{annotations:[{type:'line',mode:'horizontal',scaleID:'y-axis-0',value:4,borderColor:'rgba(255,0,0,0.8)',borderWidth:2,borderDash:[4,4],label:{enabled:true,content:'절단값 4',position:'right',backgroundColor:'rgba(255,0,0,0.8)',fontColor:'#fff'}}]}}
    };
    return base+encodeURIComponent(JSON.stringify(ch));
  }
  
  if(scaleId==='moci'){
    const display=extra?.display||'';
    const parts=display.split('/');
    const sub=parts[1]||'';
    const m=sub.match(/확인(\d+)-청결(\d+)-느림(\d+)-의심(\d+)/);
    const [확인,청결,느림,의심]=m?[parseInt(m[1]),parseInt(m[2]),parseInt(m[3]),parseInt(m[4])]:[0,0,0,0];
    const ch={type:'bar',
      data:{labels:['확인','청결','느림','의심'],
        datasets:[{label:'점수',data:[확인,청결,느림,의심],
          backgroundColor:['rgba(99,102,241,0.7)','rgba(59,130,246,0.7)','rgba(16,185,129,0.7)','rgba(245,158,11,0.7)'],
          borderWidth:1}]},
      options:{legend:{display:false},
        title:{display:true,text:'MOCI 세부지표 (확인15/청결17/느림13/의심12)',fontSize:13,fontStyle:'bold'},
        scales:{yAxes:[{ticks:{beginAtZero:true,max:20}}]},
        plugins:{datalabels:{anchor:'end',align:'top',font:{size:16,weight:'bold'}}},
        annotation:{annotations:[
          {type:'line',mode:'horizontal',scaleID:'y-axis-0',value:15,borderColor:'rgba(99,102,241,0.8)',borderWidth:2,borderDash:[4,4],label:{enabled:true,content:'확인15',position:'left',backgroundColor:'rgba(99,102,241,0.8)',fontColor:'#fff'}},
          {type:'line',mode:'horizontal',scaleID:'y-axis-0',value:17,borderColor:'rgba(59,130,246,0.8)',borderWidth:2,borderDash:[4,4],label:{enabled:true,content:'청결17',position:'right',backgroundColor:'rgba(59,130,246,0.8)',fontColor:'#fff'}},
          {type:'line',mode:'horizontal',scaleID:'y-axis-0',value:13,borderColor:'rgba(16,185,129,0.8)',borderWidth:2,borderDash:[4,4],label:{enabled:true,content:'느림13',position:'left',backgroundColor:'rgba(16,185,129,0.8)',fontColor:'#fff'}},
          {type:'line',mode:'horizontal',scaleID:'y-axis-0',value:12,borderColor:'rgba(245,158,11,0.8)',borderWidth:2,borderDash:[4,4],label:{enabled:true,content:'의심12',position:'right',backgroundColor:'rgba(245,158,11,0.8)',fontColor:'#fff'}}
        ]}}
    };
    return base+encodeURIComponent(JSON.stringify(ch));
  }
  return null;
}

function openGraph(url){window.open(url,'_blank');}
function openGraph2(sessId,scaleId){
  const res=allResults.find(r=>r.session_id===sessId&&r.scale_id===scaleId);
  if(!res){toast('데이터 없음');return;}
  const extra=tryParse(res.extra_scores||'{}');
  const url=getGraphUrl2(scaleId,extra);
  if(url)window.open(url,'_blank');
  else toast('세부 그래프 없음');
}

function showQRById(sessId){
  showQR(getUserBase()+'#s-'+sessId);
}
function copyLinkById(sessId){
  copyText(getUserBase()+'#s-'+sessId);
}


function showQR(url){
  document.getElementById('modal-qr-inner').innerHTML='';
  new QRCode(document.getElementById('modal-qr-inner'),{text:url,width:200,height:200});
  document.getElementById('modal-qr-url').textContent=url;
  document.getElementById('modal-qr').style.display='flex';
}

let editingResId=null;
function editComment(resId,cur){
  editingResId=resId||null;
  document.getElementById('comment-inp').value=cur||'';
  document.getElementById('modal-comment').style.display='flex';
}
async function saveComment(){
  const txt=document.getElementById('comment-inp').value.trim();
  if(editingResId){await sb.from('results').update({comment:txt}).eq('id',editingResId);}
  closeModal('modal-comment');toast('저장되었습니다.');loadResults();
}

async function searchPatient(){
  const q=document.getElementById('pt-search').value.trim();
  if(!q){toast('이름 또는 번호를 입력하세요.');return;}
  const{data:sessions}=await sb.from('sessions').select('*').ilike('patient_name','%'+q+'%').order('created_at',{ascending:false});
  if(!sessions||sessions.length===0){document.getElementById('pt-result').innerHTML='<div class="empty">검색 결과가 없습니다.</div>';return;}
  const{data:results}=await sb.from('results').select('*').in('session_id',sessions.map(s=>s.id));
  document.getElementById('pt-result').innerHTML=sessions.map(sess=>{
    const sr=(results||[]).filter(r=>r.session_id===sess.id);
    const dt=new Date(sess.created_at);
    const ds=`${String(dt.getFullYear()).slice(2)}${p2(dt.getMonth()+1)}${p2(dt.getDate())} ${p2(dt.getHours())}:${p2(dt.getMinutes())}`;
    return`<div style="background:#fff;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px;border:1px solid #e8e8e8">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div><div style="font-size:14px;font-weight:600">${sess.patient_name||''} <span style="font-size:11px;color:#aaa;font-weight:400">${sess.title||''}</span></div>
        <div style="font-size:11px;color:#aaa">${ds} · ${sess.scales?.length||0}개 검사</div></div>
        <span class="status-badge ${sess.status==='완료'?'s-done':'s-wait'}">${sess.status}</span>
      </div>
      ${sr.length===0?'<div style="font-size:12px;color:#aaa">결과 없음</div>':sr.map(r=>{
        const sc=SCALES[r.scale_id];const extra=tryParse(r.extra_scores||'{}');
        const gUrl=getGraphUrl(r.scale_id,extra);
        const copyEsc=(r.copy_text||'').replace(/'/g,"&#39;").replace(/\n/g,' ');
        return`<div style="padding:8px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="sc-tag ${TAG_CLS[sc?.cat]||'tag-other'}">${sc?.name||r.scale_id}</span>
          <span style="font-size:11px;color:#888">[${sc?.title||''}] ${sc?.no||''}/</span>
          <span style="font-weight:600;font-size:13px">${extra.display||r.score}</span>
          <span class="sev ${getSevCls(r.interp||'')}">${r.interp||''}</span>
          ${r.copy_text?`<button class="btn sm" onclick="copyText('${copyEsc}')">복사</button>`:''}
          ${gUrl?`<button class="btn sm" onclick="openGraph('${gUrl}')">그래프</button>`:''}
          <button class="btn sm blue" onclick="savePDF('${sess.id}','${r.scale_id}')">PDF</button>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function getSevCls(i){
  if(!i)return'sev-n';
  if(i.includes('아님')||i.includes('정상')||i.includes('기준만족하지'))return'sev-n';
  if(i.includes('경도')||i.includes('경한')||i.includes('의심')||i.includes('경계')||i.includes('일반인평균'))return'sev-m';
  if(i.includes('중등도')||i.includes('가능')||i.includes('평균초과')||i.includes('확실'))return'sev-mo';
  return'sev-s';
}
function copyText(t){navigator.clipboard.writeText(t).then(()=>toast('복사되었습니다!'));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function closeModal(id){document.getElementById(id).style.display='none';}
function tryParse(s){try{return JSON.parse(s);}catch{return{};}}
function p2(n){return String(n).padStart(2,'0');}

// 초기화 - DOM 로드 후 실행
document.addEventListener('DOMContentLoaded',function(){
  renderCatCards();
  renderScaleGrid('all');
  loadResults();
});
